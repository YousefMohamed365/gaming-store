<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gaming Store 🎮</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="welcome-model" class="modal-overlay">
      <div class="welcome-box">
        <h2>Welcome</h2>
        <p>Register your data to enter the world of games</p>
        <form id="login-form">
          <input type="text" id="user-name" placeholder="Username" required />
          <input type="email" id="user-email" placeholder="Email" required />
          <button type="submit">Enter the store</button>
        </form>
      </div>
    </div>
    <header id="main-header" class="hidden">
      <div class="logo">Gaming STORE 🎮</div>
      <div id="user-welcome-msg" class="user-msg"></div>
      <div class="cart-btn">
        <span>Purchasing cart🛒</n>
        <span id="cart-count">0</span>
      </div>
    </header>
    <main id="main-content" class="">
      <div id="products-container" class="products-grid"></div>
    </main>

    <div id="details-modal" class="modal-overlay hidden">
      <div class="details-box">
        <span id="close-details" class="close-btn">&times;</span>
        <div class="details-content">
          <img id="modal-img" src="" alt="" />
          <div class="details-info">
            <h2 id="modal-title"></h2>
            <p id="modal-category" class="category-tag"></p>
            <div class="price-section">
              <span>السعر: </span>
              <span id="modal-price"></span>
            </div>
            <button id="modal-buy-btn">إضافة إلى العربة 🛒</button>
          </div>
        </div>
      </div>
    </div>
    <div id="game-modal" class="modal hidden">
      <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div id="modal-details"></div>
      </div>
    </div>
    <script src="main.js"></script>
  </body>
</html>
